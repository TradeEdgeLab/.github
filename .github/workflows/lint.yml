name: Lint

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"
      ruff-version:
        type: string
        default: "0.9.x"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/ruff-action@v3
        with:
          version: ${{ inputs.ruff-version }}
          args: "check ."

      - uses: astral-sh/ruff-action@v3
        with:
          version: ${{ inputs.ruff-version }}
          args: "format --check ."
